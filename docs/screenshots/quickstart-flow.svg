<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="32" fill="#F4EFE6"/>
  <rect x="40" y="40" width="1120" height="680" rx="28" fill="#FFFDF8" stroke="#D8CCBA" stroke-width="2"/>
  <text x="72" y="100" fill="#1D2A33" font-family="'SFMono-Regular', Consolas, monospace" font-size="22" font-weight="700">serve-here quick start</text>
  <text x="72" y="132" fill="#5E6B74" font-family="'PingFang SC', 'Noto Sans SC', sans-serif" font-size="20">从安装到打开目录页，只要三步</text>

  <rect x="72" y="172" width="500" height="488" rx="22" fill="#19242D"/>
  <circle cx="110" cy="208" r="8" fill="#FF6B6B"/>
  <circle cx="136" cy="208" r="8" fill="#F4C95D"/>
  <circle cx="162" cy="208" r="8" fill="#61D095"/>
  <text x="198" y="214" fill="#DCE7EE" font-family="'SFMono-Regular', Consolas, monospace" font-size="18">Terminal</text>

  <text x="100" y="276" fill="#61D095" font-family="'SFMono-Regular', Consolas, monospace" font-size="24">$ npm install -g @chenpu17/serve-here</text>
  <text x="100" y="324" fill="#DCE7EE" font-family="'SFMono-Regular', Consolas, monospace" font-size="22">added 6 packages in 3s</text>

  <text x="100" y="392" fill="#61D095" font-family="'SFMono-Regular', Consolas, monospace" font-size="24">$ cd ./public</text>
  <text x="100" y="440" fill="#61D095" font-family="'SFMono-Regular', Consolas, monospace" font-size="24">$ serve-here -p 8080</text>
  <text x="100" y="488" fill="#DCE7EE" font-family="'SFMono-Regular', Consolas, monospace" font-size="22">Serving: ./public</text>
  <text x="100" y="522" fill="#DCE7EE" font-family="'SFMono-Regular', Consolas, monospace" font-size="22">Local:   http://127.0.0.1:8080</text>
  <text x="100" y="556" fill="#DCE7EE" font-family="'SFMono-Regular', Consolas, monospace" font-size="22">Stats:   http://127.0.0.1:8080/.serve-here/stats</text>

  <rect x="620" y="172" width="470" height="488" rx="22" fill="#F8F2E7" stroke="#DECDAF" stroke-width="2"/>
  <rect x="652" y="206" width="406" height="54" rx="16" fill="#FFFDF8" stroke="#D8CCBA" stroke-width="2"/>
  <text x="680" y="240" fill="#4A5A63" font-family="'SFMono-Regular', Consolas, monospace" font-size="20">http://127.0.0.1:8080</text>

  <rect x="652" y="286" width="406" height="154" rx="20" fill="#FFFDF8"/>
  <text x="684" y="332" fill="#1D2A33" font-family="'PingFang SC', 'Noto Sans SC', sans-serif" font-size="28" font-weight="700">Directory Browser</text>
  <text x="684" y="372" fill="#5E6B74" font-family="'PingFang SC', 'Noto Sans SC', sans-serif" font-size="20">紧凑目录浏览页 / Compact listing UI</text>
  <rect x="684" y="396" width="144" height="26" rx="13" fill="#DDEFE3"/>
  <text x="712" y="414" fill="#24553A" font-family="'PingFang SC', 'Noto Sans SC', sans-serif" font-size="14">Light theme</text>
  <rect x="842" y="396" width="104" height="26" rx="13" fill="#E8E6FF"/>
  <text x="875" y="414" fill="#46408F" font-family="'PingFang SC', 'Noto Sans SC', sans-serif" font-size="14">EN / 中文</text>

  <rect x="652" y="466" width="194" height="132" rx="18" fill="#FFFDF8"/>
  <text x="680" y="504" fill="#1D2A33" font-family="'PingFang SC', 'Noto Sans SC', sans-serif" font-size="22" font-weight="700">Browse</text>
  <text x="680" y="538" fill="#5E6B74" font-family="'PingFang SC', 'Noto Sans SC', sans-serif" font-size="18">查看目录和文件</text>
  <text x="680" y="568" fill="#5E6B74" font-family="'PingFang SC', 'Noto Sans SC', sans-serif" font-size="18">Filter, sort, open</text>

  <rect x="864" y="466" width="194" height="132" rx="18" fill="#FFFDF8"/>
  <text x="892" y="504" fill="#1D2A33" font-family="'PingFang SC', 'Noto Sans SC', sans-serif" font-size="22" font-weight="700">Observe</text>
  <text x="892" y="538" fill="#5E6B74" font-family="'PingFang SC', 'Noto Sans SC', sans-serif" font-size="18">打开 /stats</text>
  <text x="892" y="568" fill="#5E6B74" font-family="'PingFang SC', 'Noto Sans SC', sans-serif" font-size="18">实时看运行状态</text>

  <circle cx="596" cy="308" r="20" fill="#C66B3D"/>
  <text x="588" y="315" fill="#FFF8F0" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="700">1</text>
  <circle cx="596" cy="438" r="20" fill="#C66B3D"/>
  <text x="588" y="445" fill="#FFF8F0" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="700">2</text>
  <circle cx="596" cy="556" r="20" fill="#C66B3D"/>
  <text x="588" y="563" fill="#FFF8F0" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="700">3</text>

  <text x="72" y="694" fill="#6E5D46" font-family="'PingFang SC', 'Noto Sans SC', sans-serif" font-size="18">One binary, npm-native install, browser UI plus live stats.</text>
